[build]
  publish = "."
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "18"

[functions]
  node_bundler = "esbuild"

# ── Redirects API → Netlify Function ──────────────────────────
[[redirects]]
  from = "/auth/*"
  to = "/.netlify/functions/api"
  status = 200

[[redirects]]
  from = "/admin/*"
  to = "/.netlify/functions/api"
  status = 200

[[redirects]]
  from = "/user/*"
  to = "/.netlify/functions/api"
  status = 200

[[redirects]]
  from = "/track"
  to = "/.netlify/functions/api"
  status = 200
